name: Publish Electron App

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run electron:build:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  publish-mac:
    needs: [publish-windows]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm install
      - run: npm run electron:build:publish
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}