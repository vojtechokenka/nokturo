# Publish Electron app to GitHub Releases on version tag push.
# Trigger: git tag v* && git push origin v*
#
# Required: Add GH_TOKEN (Personal Access Token with repo scope) to repo Secrets.
# Create at https://github.com/settings/tokens — needed for electron-builder publish.

name: Publish Electron

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Require GH_TOKEN
        run: |
          if [ -z "${{ secrets.GH_TOKEN }}" ]; then
            echo "::error::GH_TOKEN is not set. Add it in repo Settings → Secrets and variables → Actions (PAT with repo scope)."
            exit 1
          fi
          echo "GH_TOKEN is set."

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: node scripts/generate-icon.js

      - name: Build Vite
        run: npm run build

      - name: Build and publish Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --publish always
