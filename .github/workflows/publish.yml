# Publish Electron app to GitHub Releases on version tag push.
# Trigger: git tag v* && git push origin v*
#
# Uses repository GITHUB_TOKEN for release publish.

name: Publish Electron

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icon
        run: node scripts/generate-icon.js

      - name: Build Vite
        run: npm run build

      - name: Build and publish Electron (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --publish always
